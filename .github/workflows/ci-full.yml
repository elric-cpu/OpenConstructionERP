name: CI Full Suite

# Nightly full backend test run (unit + integration). The push gate in
# ci.yml runs the unit tree only because the integration tree against a
# service container does not fit the 60 minute job limit. This workflow
# gives the integration tree a real budget and can also be started by hand.

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

jobs:
  backend-full:
    name: Backend Full Suite
    runs-on: ubuntu-latest
    timeout-minutes: 360
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: oe
          POSTGRES_PASSWORD: oe
          POSTGRES_DB: openconstructionerp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U oe -d openconstructionerp_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Create empty frontend dist (hatchling force-include)
        run: |
          mkdir -p ../frontend/dist
          touch ../frontend/dist/.gitkeep

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run full test suite
        env:
          DATABASE_URL: postgresql+asyncpg://oe:oe@localhost:5432/openconstructionerp_test
          DATABASE_SYNC_URL: postgresql+psycopg2://oe:oe@localhost:5432/openconstructionerp_test
        # A per-test timeout so one hung test can no longer eat the whole 6h
        # budget with the run cancelled and no signal of where it stalled - it
        # becomes a reported failure and the suite carries on. --durations and
        # -ra then make the slow spots and failures readable without scrolling
        # six hours of Postgres logs. 900s is generous: no real unit or
        # integration test should approach 15 minutes.
        run: pytest -q -ra --durations=50 --timeout=900 --timeout-method=thread

  backend-full-cross-os:
    name: Backend Full Suite (${{ matrix.os }}, embedded PG)
    # Nightly cross-OS deep run: the full backend suite on the embedded
    # PostgreSQL the desktop and self-hosted builds ship (pixeltable-pgserver,
    # no Docker), on the two OSes the Linux service-container job above cannot
    # cover. Nightly, so the heavier embedded-PG path has room and a red run is a
    # signal to fix rather than a merge blocker. This is where OS-specific
    # integration gaps (path handling, file locking, case sensitivity) surface.
    runs-on: ${{ matrix.os }}
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Create empty frontend dist (hatchling force-include)
        shell: bash
        run: |
          mkdir -p ../frontend/dist
          touch ../frontend/dist/.gitkeep

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run full test suite (embedded PostgreSQL)
        # No DATABASE_URL -> conftest boots the embedded pixeltable-pgserver
        # cluster. thread timeout method because signal/SIGALRM is Unix-only and
        # would break the Windows runner.
        run: pytest -q -ra --durations=50 --timeout=900 --timeout-method=thread
