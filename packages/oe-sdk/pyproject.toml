[project]
name = "oe-sdk"
version = "0.1.0"
description = "Module SDK for OpenConstructionERP. One clean import surface for building construction modules on the platform core."
license = "AGPL-3.0-or-later"
requires-python = ">=3.12"
authors = [
    { name = "Artem Boiko", email = "info@datadrivenconstruction.io" },
]
maintainers = [
    { name = "Data Driven Construction", email = "info@datadrivenconstruction.io" },
]
readme = "README.md"
keywords = [
    "openconstructionerp",
    "construction",
    "construction-management",
    "sdk",
    "modules",
    "plugins",
    "estimation",
    "boq",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: GNU Affero General Public License v3 or later (AGPLv3+)",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Framework :: FastAPI",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
]

# The SDK is a thin, faithful facade over the platform core primitives that live
# in the ``app`` package: app.core.events, app.core.hooks,
# app.core.validation.engine, app.core.permissions, app.core.module_loader,
# app.dependencies and app.database. That package is shipped by the
# ``openconstructionerp`` distribution, so the SDK depends on it. In the monorepo
# install both editable so nothing is downloaded (see README). The version floor
# tracks the platform release that introduced this package layout; bump it
# deliberately when the SDK starts to rely on a newer core surface.
dependencies = [
    "openconstructionerp>=10.9.0",
]

[project.scripts]
oe-sdk = "oe_sdk.cli:main"

[project.urls]
Homepage = "https://datadrivenconstruction.io/erp"
Documentation = "https://github.com/datadrivenconstruction/OpenConstructionERP/blob/main/docs/platform/how-it-works-for-builders.md"
Repository = "https://github.com/datadrivenconstruction/OpenConstructionERP"
Issues = "https://github.com/datadrivenconstruction/OpenConstructionERP/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["oe_sdk"]

[tool.hatch.build.targets.sdist]
include = [
    "oe_sdk",
    "README.md",
]

[tool.ruff]
target-version = "py312"
line-length = 120
src = ["oe_sdk"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "A", "C4", "PT", "RET", "SIM"]
ignore = [
    "E501",   # line-too-long, formatter handles wrapping where it matters
    "UP007",  # X | Y union syntax, keep readability calls to the author
    "UP035",  # deprecated typing imports, not relevant here
]

[tool.ruff.lint.isort]
known-first-party = ["oe_sdk"]
