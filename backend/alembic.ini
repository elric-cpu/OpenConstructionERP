[alembic]
# Resolve the scripts dir relative to THIS ini file (%(here)s), not the
# process CWD. The unified container runs uvicorn with --app-dir
# /app/backend but never chdirs there, so a bare "alembic" resolved from
# CWD (/app) pointed at a non-existent /app/alembic and made the /api/health
# head check warn on every 30s poll. %(here)s expands to the ini's own
# directory (backend/), so backend/alembic resolves regardless of CWD.
script_location = %(here)s/alembic
sqlalchemy.url = sqlite:///./openestimate.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
